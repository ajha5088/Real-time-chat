name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: chatapp/backend
  FRONTEND_IMAGE: chatapp/frontend

jobs:
  # Install dependencies
  install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.service }}/package-lock.json"

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service }}

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ${{ matrix.service }}/node_modules
          key: ${{ matrix.service }}-${{ hashFiles('**/package-lock.json') }}

  # Lint code
  lint:
    runs-on: ubuntu-latest
    needs: install
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.service }}/package-lock.json"

      - name: Lint ${{ matrix.service }}
        run: npm run lint || true
        working-directory: ${{ matrix.service }}

  # Run tests
  test:
    runs-on: ubuntu-latest
    needs: install
    strategy:
      matrix:
        service: [backend, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chatuser
          POSTGRES_PASSWORD: chatpass
          POSTGRES_DB: chatdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mongodb:
        image: mongo:7.0
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.service }}/package-lock.json"

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service }}

      - name: Run tests
        run: npm test -- --passWithNoTests --coverage
        working-directory: ${{ matrix.service }}
        env:
          DB_HOST: localhost
          MONGODB_URI: mongodb://localhost:27017/testdb
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: matrix.service == 'backend'
        with:
          files: ./${{ matrix.service }}/coverage/coverage-final.json

  # Build Docker images
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        service: [backend, frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.service == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to staging
        run: |
          echo "🚀 Deploying to staging..."
          # Add your staging deployment commands here
          # Example: kubectl apply -f k8s/staging/
          echo "✓ Staging deployment complete"
        env:
          KUBECONFIG: ${{ secrets.KUBE_CONFIG }}

  # Deploy to production
  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production..."
          # Add your production deployment commands here
          # Example: kubectl apply -f k8s/production/
          echo "✓ Production deployment complete"
        env:
          KUBECONFIG: ${{ secrets.KUBE_CONFIG }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: Production release deployment
          draft: false
          prerelease: false
